<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lumen for Outlook</title>
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #18181b;
      --panel-2: #1f1f23;
      --border: #2a2a2f;
      --text: #e7e7ea;
      --text-muted: #9a9a9f;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --danger: #f87171;
      --success: #34d399;
      --info: #60a5fa;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      height: 100%;
      overflow-y: auto;
    }
    .wrap { padding: 14px 12px; }
    header {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    header h1 {
      margin: 0; font-size: 14px; font-weight: 600; flex: 1;
    }
    .conn {
      font-size: 11px; padding: 3px 7px; border-radius: 10px;
      background: var(--panel-2); color: var(--text-muted);
    }
    .conn.ok { color: var(--success); }
    .conn.err { color: var(--danger); }

    .backend-row {
      display: flex; gap: 6px; align-items: center;
      margin-bottom: 12px;
    }
    .backend-row label { font-size: 11px; color: var(--text-muted); }
    input[type="text"], input[type="email"], textarea {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 9px; font-size: 12px; font-family: inherit;
      width: 100%;
    }
    input:focus, textarea:focus {
      outline: none; border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 60px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .tab {
      flex: 1; padding: 7px 10px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; font-size: 12px; color: var(--text-muted);
      text-align: center;
    }
    .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

    .section { display: none; flex-direction: column; gap: 8px; }
    .section.active { display: flex; }

    .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    button {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    button:hover:not(:disabled) { background: #2a2a2f; }
    button.primary {
      background: var(--accent); color: #000; border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-row button { flex: 1; min-width: 100px; }

    .result {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px;
      white-space: pre-wrap; word-break: break-word;
      font-size: 12px; min-height: 60px;
    }
    .status {
      font-size: 11px; padding: 6px 8px; border-radius: 5px;
      margin-top: 4px;
    }
    .status.err { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .status.ok { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
    .status.info { background: rgba(96,165,250,0.1); color: var(--info); border: 1px solid rgba(96,165,250,0.3); }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .meta {
      font-size: 11px; color: var(--text-muted);
      padding: 6px 8px; background: var(--panel);
      border-radius: 5px; border: 1px solid var(--border);
    }
    .meta strong { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>✉ Lumen for Outlook</h1>
      <span id="connStatus" class="conn">…</span>
    </header>

    <div class="backend-row">
      <label>Backend</label>
      <input id="backendUrl" type="text" placeholder="https://lumen-demo.azurewebsites.net">
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="reply">Read &amp; Reply</div>
      <div class="tab" data-tab="compose">Compose</div>
    </div>

    <!-- Read & Reply tab -->
    <div id="tab-reply" class="section active">
      <button id="btnRead">📥 Read Current Email</button>
      <div id="emailMeta" class="meta" style="display:none;"></div>
      <textarea id="emailBody" placeholder="Email body will appear here…" readonly></textarea>

      <label class="label">Your instruction</label>
      <textarea id="replyInstruction" placeholder='e.g. "Reply formally declining the meeting and suggest next week"'></textarea>

      <div class="btn-row">
        <button id="btnGenerateReply" class="primary">🤖 Generate Reply</button>
      </div>

      <label class="label">AI reply</label>
      <div id="replyResult" class="result"></div>

      <div class="btn-row">
        <button id="btnCopyReply">📋 Copy</button>
        <button id="btnInjectReply">💉 Inject</button>
        <button id="btnSendNow" class="primary">🚀 Send Now</button>
      </div>

      <div id="replyStatus"></div>
    </div>

    <!-- Compose tab -->
    <div id="tab-compose" class="section">
      <label class="label">To</label>
      <input id="composeTo" type="email" placeholder="someone@example.com">

      <label class="label">Subject</label>
      <input id="composeSubject" type="text" placeholder="Subject line">

      <label class="label">What should the email say?</label>
      <textarea id="composeInstruction" placeholder='e.g. "Let Sarah know I will be late to the standup tomorrow"'></textarea>

      <div class="btn-row">
        <button id="btnGenerateCompose" class="primary">🤖 Generate Email</button>
      </div>

      <label class="label">AI draft</label>
      <div id="composeResult" class="result"></div>

      <div class="btn-row">
        <button id="btnCopyCompose">📋 Copy</button>
        <button id="btnOpenFill">📬 Open &amp; Fill</button>
        <button id="btnSendNowCompose" class="primary">🚀 Send Now</button>
      </div>

      <div id="composeStatus"></div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
